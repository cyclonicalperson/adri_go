<div class="container">
  <h1>Kuvarski Recepti</h1>

  <div class="lista">
    <div class="recept-kartica" *ngFor="let recept of recepti" (click)="odaberiRecept(recept)">
      <div class="kartica-sadrzaj">
        <h3>{{ recept.naziv }}</h3>
        <p>{{ recept.opis }}</p>
      </div>
      <button class="btn-obrisi" (click)="obrisiRecept(recept.id); $event.stopPropagation()">Obriši</button>
    </div>
  </div>

  <div class="detalji" *ngIf="odabraniRecept">
    <h2>{{ odabraniRecept.naziv }}</h2>
    <p><strong>Opis:</strong> {{ odabraniRecept.opis }}</p>
    <div class="info-sekcija">
      <p><strong>Sastojci:</strong></p>
      <div class="tekst-blok">{{ odabraniRecept.sastojci }}</div>
    </div>
    <div class="info-sekcija">
      <p><strong>Koraci:</strong></p>
      <div class="tekst-blok">{{ odabraniRecept.koraci }}</div>
    </div>
    <p class="datum">Dodato: {{ odabraniRecept.kreirano | date:'dd.MM.yyyy' }}</p>
    <button class="btn-zatvori" (click)="zatvoriDetalje()">Zatvori</button>
  </div>

  <div class="forma">
    <h2>Novi Recept</h2>
    <div class="form-grupa">
      <input placeholder="Naziv recepta" [(ngModel)]="noviRecept.naziv" />
      <input placeholder="Kratak opis" [(ngModel)]="noviRecept.opis" />
      <textarea placeholder="Sastojci (razdvojite zarezom)" [(ngModel)]="noviRecept.sastojci" rows="3"></textarea>
      <textarea placeholder="Koraci pripreme" [(ngModel)]="noviRecept.koraci" rows="5"></textarea>
      <button class="btn-dodaj" (click)="dodajRecept()">Sačuvaj Recept</button>
    </div>
  </div>
</div>
