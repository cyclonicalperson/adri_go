<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__eyebrow">Admin Panel</span>
      <a routerLink="/admin/dashboard">EventHub</a>
    </div>

    <nav class="sidebar__nav">
      <a routerLink="/admin/dashboard" routerLinkActive="sidebar__link--active" class="sidebar__link">Dashboard</a>
      <a routerLink="/admin/events" routerLinkActive="sidebar__link--active" class="sidebar__link">Events</a>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">{{ authService.session()?.username }}</div>
      <button type="button" class="sidebar__logout" (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="admin-content">
    <router-outlet />
  </main>
</div>
