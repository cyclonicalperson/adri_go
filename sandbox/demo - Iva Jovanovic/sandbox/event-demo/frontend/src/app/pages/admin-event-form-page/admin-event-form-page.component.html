<section class="admin-page">
  <header class="admin-page__header">
    <div>
      <span class="eyebrow">Event editor</span>
      <h1>{{ pageTitle() }}</h1>
    </div>
    <a routerLink="/admin/events" class="button button--ghost">Back to events</a>
  </header>

  @if (errorMessage()) {
    <div class="alert alert--error">{{ errorMessage() }}</div>
  }

  @if (isLoading()) {
    <div class="state-card">Loading event form...</div>
  } @else {
    <section class="form-panel">
      <form [formGroup]="eventForm" (ngSubmit)="submit()" class="form-grid">
        <label class="field">
          <span>Title</span>
          <input type="text" formControlName="title" placeholder="Enter event title" />
        </label>

        <label class="field field--full">
          <span>Description</span>
          <textarea rows="6" formControlName="description" placeholder="Describe the event"></textarea>
        </label>

        <label class="field">
          <span>Date</span>
          <input type="date" formControlName="eventDate" />
        </label>

        <label class="field">
          <span>Time</span>
          <input type="time" formControlName="eventTime" />
        </label>

        <label class="field">
          <span>Location</span>
          <input type="text" formControlName="location" placeholder="Enter event location" />
        </label>

        <label class="field">
          <span>Max Participants</span>
          <input type="number" formControlName="maxParticipants" min="1" />
        </label>

        <label class="field field--toggle">
          <span>Registration Open</span>
          <input type="checkbox" formControlName="isRegistrationOpen" />
        </label>

        <button class="button button--primary" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Saving...' : 'Save event' }}
        </button>
      </form>
    </section>
  }
</section>
