<section class="login-page">
  <div class="login-card">
    <span class="eyebrow">Admin access</span>
    <h1>Sign in to manage events and registrations.</h1>
    <p>Use the seeded demo account to access the admin panel.</p>

    @if (errorMessage) {
      <div class="alert alert--error">{{ errorMessage }}</div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="form-grid">
      <label class="field">
        <span>Username</span>
        <input type="text" formControlName="username" placeholder="Enter admin username" />
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="Enter admin password" />
      </label>

      <button class="button button--primary button--block" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Signing in...' : 'Login to admin panel' }}
      </button>
    </form>

    <div class="login-card__note">
      Demo credentials:
      <strong>admin / admin</strong>
    </div>
  </div>
</section>
