<div class="page">
  <header>
    <h1>TaskManager</h1>
  </header>

  <section class="toolbar card-lite">
    <label>
      Filter po statusu
      <select [(ngModel)]="selectedStatus" (change)="loadTasks()">
        <option *ngFor="let status of statuses" [value]="status">{{ status || 'Svi' }}</option>
      </select>
    </label>
  </section>

  <div class="layout">
    <app-task-form [editTask]="editingTask" (save)="onSave($event)" (cancel)="onCancelEdit()"></app-task-form>
    <app-task-list [tasks]="tasks" (edit)="onEdit($event)" (delete)="onDelete($event)"></app-task-list>
  </div>
</div>
