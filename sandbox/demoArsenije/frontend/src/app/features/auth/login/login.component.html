<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">⬡</span>
    </div>
    <h1 class="login-title">Dobrodošli</h1>
    <p class="login-sub">Prijavite se na vaš nalog</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Korisničko ime</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Unesite korisničko ime"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Lozinka</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Unesite lozinku"
            autocomplete="current-password"
          />
        </div>
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Prijava...
        } @else {
          Prijavi se
        }
      </button>
    </form>

    <p class="hint">Demo: <strong>admin</strong> / <strong>Admin123!</strong></p>
  </div>
</div>
