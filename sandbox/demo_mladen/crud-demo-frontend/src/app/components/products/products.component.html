<div class="container">
  <h2>Products</h2>

  <div class="form-section">
    <h3>{{ isEditing ? 'Edit Product' : 'Add Product' }}</h3>
    <div *ngIf="!isEditing">
      <input [(ngModel)]="newProduct.name" placeholder="Name" />
      <input [(ngModel)]="newProduct.price" type="number" placeholder="Price" />
      <input [(ngModel)]="newProduct.quantity" type="number" placeholder="Quantity" />
      <button (click)="save()">Add</button>
    </div>
    <div *ngIf="isEditing && selectedProduct">
      <input [(ngModel)]="selectedProduct.name" placeholder="Name" />
      <input [(ngModel)]="selectedProduct.price" type="number" placeholder="Price" />
      <input [(ngModel)]="selectedProduct.quantity" type="number" placeholder="Quantity" />
      <button (click)="save()">Update</button>
      <button (click)="cancel()">Cancel</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Price</th><th>Quantity</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.price }}</td>
        <td>{{ p.quantity }}</td>
        <td>
          <button (click)="edit(p)">Edit</button>
          <button (click)="delete(p.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
