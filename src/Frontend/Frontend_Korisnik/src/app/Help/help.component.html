<div class="subpage-container">

  <div class="header-bar">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Help & Support</h1>
    <div style="width:38px"></div>
  </div>

  <div class="scroll-content">

    <div class="help-hero">
      <div class="help-hero-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
      </div>
      <h2>How can we help?</h2>
      <p>Find answers below or reach out to our support team</p>
    </div>

    <div class="info-section-title">Quick Actions</div>
    <div class="info-card quick-actions-card">
      <button class="quick-action-btn" (click)="contactSupport()">
        <div class="quick-action-icon green-bg">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="quick-action-text">
          <span class="quick-action-title">Email Support</span>
          <span class="quick-action-sub">support@adrigo.app</span>
        </div>
        <svg class="link-arrow-sm" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>

    <div class="info-section-title" style="margin-top: 24px">Frequently Asked Questions</div>
    <div class="faq-list">
      <div
        *ngFor="let faq of faqs; let i = index"
        class="faq-item"
        [class.open]="openFaq === i"
        (click)="toggleFaq(i)">
        <div class="faq-question">
          <span>{{ faq.q }}</span>
          <svg class="faq-chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        <div class="faq-answer" *ngIf="openFaq === i">
          {{ faq.a }}
        </div>
      </div>
    </div>

    <div class="version-info">
      <span>AdriGo v1.0.0</span>
      <span class="version-dot">·</span>
      <span>Made with ❤️ for Adriatic explorers</span>
    </div>

  </div>
</div>
