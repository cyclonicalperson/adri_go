<div class="page-container">

  <div class="logo-area">
    <span class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </span>
    <span class="logo-name">AdriGo</span>
  </div>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h1 class="title">Forgot Password?</h1>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <!-- Success state -->
    <div *ngIf="successMessage" class="success-box">
      <span class="success-icon">✅</span>
      {{ successMessage }}
    </div>

    <!-- Error message -->
    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <div *ngIf="!successMessage">
      <div class="form-group">
        <label class="label">Email address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </span>
          <input type="email" [(ngModel)]="email" placeholder="example@mail.com"
                 (keyup.enter)="submit()">
        </div>
      </div>

      <button class="btn-primary" (click)="submit()" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
      </button>
    </div>

    <button class="btn-back" (click)="goToLogin()">
      ← Back to Login
    </button>
  </div>

</div>
