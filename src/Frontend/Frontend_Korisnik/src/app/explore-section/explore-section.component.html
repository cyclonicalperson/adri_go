<div class="list-container">

  <!-- Header -->
  <app-header title="{{ sectionLabel }}">
    <div class="sort-dropdown" *ngIf="hasSearched">
      <button class="sort-btn" (click)="sortOpen = !sortOpen" [class.sort-btn-active]="sortOpen">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
        Sort
      </button>
      <div class="sort-menu" *ngIf="sortOpen">
        <button class="sort-option" [class.sort-option-active]="sortValue === 'distance:asc'" (click)="onSort('distance:asc'); sortOpen=false">Nearest</button>
        <button class="sort-option" [class.sort-option-active]="sortValue === 'createdAt:desc'" (click)="onSort('createdAt:desc'); sortOpen=false">Newest</button>
        <button class="sort-option" [class.sort-option-active]="sortValue === 'title:asc'" (click)="onSort('title:asc'); sortOpen=false">Name A-Z</button>
        <button class="sort-option" [class.sort-option-active]="sortValue === 'rating:desc'" (click)="onSort('rating:desc'); sortOpen=false">Rating</button>
        <button class="sort-option" [class.sort-option-active]="sortValue === 'reviews:desc'" (click)="onSort('reviews:desc'); sortOpen=false">Reviews</button>
      </div>
    </div>
  </app-header>

  <!-- Loading -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="loading-icon"></div>
    Loading...
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="!isLoading && locations.length === 0">
    <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" style="opacity:.3;margin-bottom:12px"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    <p>No locations to show.</p>
  </div>

  <!-- Grid -->
  <div class="scroll-area" *ngIf="!isLoading && locations.length > 0">
    <div class="location-card" *ngFor="let loc of locations">

      <div class="image-wrapper" (click)="viewDetails(loc.id)">
        <img [src]="getFirstImage(loc)" [alt]="loc.title" (error)="$any($event.target).src='assets/placeholder.jpg'">
        <div class="image-gradient"></div>
        <span class="category-badge">
          <span class="cat-dot" [style.background]="getCategoryColor(loc.postType)"></span>
          {{ formatPostType(loc.postType) }}
        </span>
        <div class="action-btns">
          <button class="action-btn" (click)="onLike(loc, $event)" title="Like">
            <svg viewBox="0 0 24 24"
                 [attr.fill]="loc.isLiked ? '#ef4444' : 'none'"
                 [attr.stroke]="loc.isLiked ? '#ef4444' : 'currentColor'"
                 stroke-width="2">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </button>
          <button class="action-btn" (click)="onSave(loc, $event)" title="Save">
            <svg viewBox="0 0 24 24"
                 [attr.fill]="loc.isSaved ? '#3b82f6' : 'none'"
                 [attr.stroke]="loc.isSaved ? '#3b82f6' : 'currentColor'"
                 stroke-width="2">
              <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="card-content" (click)="viewDetails(loc.id)">
        <div class="title-row">
          <h3>{{ loc.title }}</h3>
          <div class="rating-badge">
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            {{ loc.avgRating ? (loc.avgRating | number:'1.1-1') : 'N/A' }}
          </div>
        </div>
        <div class="info-row">
          <span class="info-item" *ngIf="loc.regionName">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            {{ loc.regionName }}
          </span>
          <span class="info-item" *ngIf="loc.distanceKm != null">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            {{ formatDistance(loc.distanceKm) }}
          </span>
          <span class="info-item">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            {{ loc.likeCount }}
          </span>
        <span class="info-item">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
          {{ loc.reviewCount }}
        </span>
      </div>
      <div class="activity-tags-row" *ngIf="getActivityTags(loc).length > 0">
        <span class="activity-tag-chip" *ngFor="let tag of getActivityTags(loc)">{{ tag }}</span>
      </div>
      <div class="divider"></div>
      <button class="view-details-btn">
          VIEW DETAILS
          <span class="arrow-icon">
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <div class="feedback-toast" *ngIf="feedbackMessage">{{ feedbackMessage }}</div>
  <app-auth-required-modal
    *ngIf="showAuthPopup"
    [message]="authPopupMessage"
    (closed)="closeAuthPopup()"
    (login)="goToLogin()">
  </app-auth-required-modal>

  <!-- Footer -->
  <div class="app-footer">
    <button class="footer-btn" (click)="goToMap()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      </span>
      <span class="footer-label">Map</span>
    </button>
    <button class="footer-btn active">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
      </span>
      <span class="footer-label">Explore</span>
    </button>
    <button class="footer-btn" (click)="goToSaved()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      </span>
      <span class="footer-label">Saved</span>
    </button>
    <button class="footer-btn" (click)="goToCalendar()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
      </span>
      <span class="footer-label">Calendar</span>
    </button>
    <button class="footer-btn" (click)="goToAccount()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </span>
      <span class="footer-label">Account</span>
    </button>
  </div>
</div>
