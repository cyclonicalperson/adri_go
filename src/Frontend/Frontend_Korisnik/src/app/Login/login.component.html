<div class="login-page-wrapper">
  <div class="animated-bg"></div>

  <div class="login-card">
    <div class="card-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
      </div>
      <span class="brand-name">GlobeCode </span>
    </div>

    <h1 class="welcome-text">Dobrodošli nazad</h1>
    

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label for="email">Email adresa</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="admin@globecode.com"
        />
      </div>

      <div class="form-field">
        <label for="password">Lozinka</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
        Prijavi se
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
      
      <div *ngIf="errorMessage" class="global-error">
        {{ errorMessage }}
      </div>
    </form>
  </div>
</div>
