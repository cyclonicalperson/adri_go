

<div class="page-container">
  <div class="login-card">
    <h1 class="title">Welcome!</h1>
    <p class="subtitle">Sign in to continue exploring Montenegro</p>

    <!-- Prikaz greške iz backenda -->
    <div *ngIf="errorMessage" style="
      background: #fde8e8;
      color: #c0392b;
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    ">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="emailOrPhone">Email or phone</label>
        <div class="input-wrapper">
          <span class="icon">✉</span>
          <input 
            type="text" 
            id="emailOrPhone" 
            formControlName="emailOrPhone" 
            placeholder="example@mail.com"
          >
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
          >
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Log In' }} <span class="arrow">→</span>
      </button>
      
      <button type="button" class="btn btn-primary btn-guest" (click)="onGuestLogin()">
        Explore as Guest
      </button>
    </form>

    <div class="divider">
      <span>OR CONTINUE AS</span>
    </div>

    <div class="social-buttons">
      <button type="button" class="btn btn-outline" (click)="onGoogleLogin()">
        <span class="social-icon google">🌐</span> Google
      </button>
      <button type="button" class="btn btn-outline" (click)="onAppleLogin()">
        <span class="social-icon apple">🍏</span> Apple
      </button>
    </div>

   <p class="register-text">
      Don't have an account? <a (click)="goToRegister()" style="cursor: pointer;">Register</a>
    </p>
  </div>

  <p class="terms-text">
    By continuing to use, you accept our Terms<br>of use and Privacy Policy.
  </p>
</div>
