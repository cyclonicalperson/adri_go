<div class="menu-overlay" (click)="onClose.emit()">
  <div class="menu-content" (click)="$event.stopPropagation()">
    
    <div class="user-header">
      <div class="user-info">
        <h3>Jovan Dizdarević</h3>
        <p>jovan@email.com</p>
      </div>
      <button type="button" class="close-x" (click)="onClose.emit()">✕</button>
    </div>

    <div class="menu-items">
      <button type="button" class="menu-item" (click)="goToAccount()">
        <span class="icon">👤</span> <span>Account</span>
      </button>

      <button type="button" class="menu-item" (click)="goToSaved()">
        <span class="icon">🔖</span> <span>Saved</span>
      </button>

      <button type="button" class="menu-item" (click)="goToCalendar()">
        <span class="icon">📅</span> <span>Calendar</span>
      </button>

      <button type="button" class="menu-item" (click)="goToTickets()">
        <span class="icon">🎟️</span> <span>Tickets</span>
      </button>
      
      <div class="divider"></div>

      <button type="button" class="menu-item" (click)="goToNotifications()">
        <span class="icon">🔔</span> <span>Notifications</span>
      </button>

      <button type="button" class="menu-item" (click)="goToSettings()">
        <span class="icon">⚙️</span> <span>Settings</span>
      </button>
    </div>

    <div class="footer">
      <button type="button" class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>
</div>
