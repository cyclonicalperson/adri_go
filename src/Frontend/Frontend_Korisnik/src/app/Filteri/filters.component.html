<div class="filters-container">

  <div class="header">
    <button class="close-btn" (click)="closeFilters()">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <h1>Filters</h1>
    <button class="clear-btn" (click)="clearAll()">
      Clear All
    </button>
  </div>

  <div class="scroll-content">

    <section class="search-section">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" 
               placeholder="Search styles (e.g. Vegan, Sandy...)" 
               [(ngModel)]="searchQuery" 
               (input)="onSearchChange()">
      </div>
      
      <div class="recommendations-box" *ngIf="recommendations.length > 0">
        <div class="rec-item" *ngFor="let rec of recommendations" (click)="selectRecommendation(rec)">
          {{ rec }}
        </div>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2>Categories</h2>
      </div>
      
      <div class="category-group" *ngFor="let cat of categories">
        
        <button class="chip main-chip" 
                [class.active]="cat.selected" 
                (click)="toggleCategory(cat)">
          <span class="chip-icon">{{ cat.icon }}</span> {{ cat.label }}
        </button>

        <div class="sub-chips-grid" *ngIf="cat.selected">
          <button *ngFor="let sub of subcategoriesMap[cat.id]" 
                  class="chip sub-chip"
                  [class.active]="selectedSubcategories.has(cat.id + '-' + sub.id)"
                  (click)="toggleSubcategory(cat.id, sub.id)">
            {{ sub.label }}
          </button>
        </div>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2>Distance</h2>
      </div>
      <div class="slider-box">
        <div class="slider-labels">
          <span>Radius</span>
          <span class="highlight">{{ radius }} km</span>
        </div>
        <input type="range" class="custom-slider" min="1" max="50" [(ngModel)]="radius" step="1">
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2>Minimal rating</h2>
      </div>
      <div class="rating-grid">
        <button *ngFor="let r of [1,2,3,4,5]" class="rating-card"
                [class.active]="minRating === r"
                (click)="setRating(r)">
          ⭐ {{ r }}+
        </button>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2>Availability</h2>
      </div>
      <div class="toggle-card">
        <div class="toggle-text">
          <h3>Open Now</h3>
          <p>Show only objects open now</p>
        </div>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="openNow">
          <span class="slider round"></span>
        </label>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2>Period for events</h2>
      </div>
      <div class="date-picker-row">
        <div class="date-input">
          <label>FROM</label>
          <input type="date" [(ngModel)]="fromDate">
        </div>
        <div class="date-input">
          <label>TO</label>
          <input type="date" [(ngModel)]="toDate">
        </div>
      </div>
    </section>

  </div>

  <div class="footer">
    <button class="apply-btn" (click)="applyFilters()">Apply Filters</button>
  </div>

</div>
