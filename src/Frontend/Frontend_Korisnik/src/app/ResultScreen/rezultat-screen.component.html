<div class="main-layout">
  <div class="phone-container">
    
    <header class="filter-header">
      <div class="search-summary-card">
        <div class="top-row">
          <button class="back-btn" (click)="goBack()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          
          <div class="search-info">
            <span class="city">Budva</span>
            <span class="divider"></span>
            <span class="dates">April 25 - April 30</span>
          </div>
        </div>
        
        <div class="bottom-row">
          <div class="guest-info">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>2 Adults - 1 Child - 1 Room</span>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="action-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
          Filters
        </button>
        <button class="action-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
          Map
        </button>
        <button class="action-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
          Sort
        </button>
      </div>
    </header>

    <main class="results-list">
      @for (apt of apartmani; track apt.id) {
        <div class="apt-card" (click)="goToDetails(apt.id)">
          <div class="img-box">
            <img [src]="apt.slika" [alt]="apt.naziv">
          </div>
          
          <div class="info-box">
            <h3>{{ apt.naziv }}</h3>
            <p class="loc">{{ apt.lokacija }}</p>
            
            <div class="rating">
              <span class="stars">★★★★★</span>
              <span class="score">{{ apt.ocena }}</span>
              <span class="count">({{ apt.brojRecenzija }} reviews)</span>
            </div>
            
            <div class="amenities">
              <span>🏊</span><span>🛏️</span><span>📶</span>
            </div>
            
            <div class="price-row">
              <span class="price-text">From <strong>{{ apt.cena }}€</strong> /night</span>
              <button class="view-btn">View Details</button>
            </div>
          </div>
        </div>
      }
    </main>

  </div>
</div>
