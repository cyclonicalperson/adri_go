<div class="bottom-sheet-overlay">
  <div class="location-details-card">

    <div class="card-header">
      <div class="category-label">
        <span class="label-dot"></span>
        {{ locationData?.category || 'General' }}
      </div>
      <button class="close-btn" (click)="onCloseClick($event)">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="image-container">
      <img [src]="displayImage" alt="Location photo" class="main-image">
    </div>

    <div class="card-body">
      <div class="title-row">
        <h2 class="location-title">{{ locationData?.title || 'Unknown Location' }}</h2>
        <div class="rating-box" *ngIf="locationData?.rating">
          <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          {{ locationData.rating }}
        </div>
      </div>

      <div class="info-row">
        <div class="info-item" *ngIf="locationData?.distance">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          {{ locationData.distance }} km from you
        </div>
        <div class="info-item" *ngIf="locationData?.status">
          <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          <span [class.status-open]="locationData.status === 'Open now'"
                [class.status-closed]="locationData.status !== 'Open now'">
            {{ locationData.status }}
          </span>
        </div>
      </div>

      <p class="reviews-text" *ngIf="locationData?.reviews">({{ locationData.reviews }} reviews)</p>

      <button class="btn-details" (click)="onViewDetailsClick($event)">
        VIEW DETAILS
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
      </button>
    </div>

  </div>
</div>
