<div class="bottom-sheet-overlay">
  <div class="location-details-card">

    <div class="card-header">
      <div class="category-label">
        <span class="label-dot"></span>
        {{ displayCategory }}
      </div>
      <button class="close-btn" (click)="onCloseClick($event)">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="image-container">
      <img [src]="displayImage" alt="Location photo" class="main-image">
    </div>

    <div class="card-body">
      <div class="title-row">
        <h2 class="location-title">{{ locationData?.title || 'Unknown Location' }}</h2>
        <div class="rating-box" *ngIf="displayRating">
          <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          {{ displayRating | number:'1.1-1' }}
        </div>
      </div>

      <div class="info-row">
        <div class="info-item" *ngIf="locationData?.regionName">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          {{ locationData.regionName }}
        </div>
      </div>

      <p class="reviews-text" *ngIf="displayReviews">({{ displayReviews | number }} reviews)</p>

      <!-- Calendar toast -->
      <p *ngIf="calendarMessage" class="calendar-toast">{{ calendarMessage }}</p>

      <div class="card-actions">
        <!-- Add to Calendar — show for all location types -->
        <button class="btn-calendar" (click)="addToCalendar($event)" title="Add to Calendar">
          <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        </button>
        <button class="btn-route" (click)="onAddToRouteClick($event)">
          Add stop
        </button>
        <button class="btn-details" (click)="onViewDetailsClick($event)">
          VIEW DETAILS
          <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <div class="auth-modal-overlay" *ngIf="showAuthModal" (click)="closeAuthModal($event)">
    <div class="auth-modal" (click)="$event.stopPropagation()">
      <h3>Login Required</h3>
      <p>Please log in to add locations to your calendar.</p>
      <div class="auth-modal-actions">
        <button class="btn-cancel" (click)="closeAuthModal($event)">Cancel</button>
        <button class="btn-login" (click)="goToLogin($event)">Login</button>
      </div>
    </div>
  </div>
</div>
