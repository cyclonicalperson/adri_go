<div class="calendar-container">

  <!-- HEADER -->
  <div class="header">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Calendar</h1>
  </div>

  <!-- UPCOMING EVENTS -->
  <div class="events-section">

    <div class="date-heading" *ngIf="upcomingEvents.length > 0">
      <h3>Upcoming Events</h3>
      <span class="event-count-badge">{{ upcomingEvents.length }}</span>
    </div>

    <div class="event-card" *ngFor="let event of upcomingEvents" (click)="viewEventDetails(event.id)">
      <img [src]="event.image" [alt]="event.title" class="event-image"
        (error)="$any($event.target).src='assets/Budva.jpg'">
      <div class="event-info">
        <h3 class="event-name">{{ event.title }}</h3>
        <div class="event-time">
          <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          {{ event.time }} · {{ event.location }}
        </div>
        <span class="event-status status-confirmed">UPCOMING</span>
      </div>
      <div class="event-actions">
        <button class="add-cal-btn" (click)="$event.stopPropagation()">
          <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          Add
        </button>
        <button class="details-link">
          Details
          <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
      </div>
    </div>

    <!-- PAST EVENTS -->
    <div class="date-heading" *ngIf="pastEvents.length > 0" style="margin-top:24px;">
      <h3>Past Events</h3>
      <span class="event-count-badge" style="background:var(--gray-400);">{{ pastEvents.length }}</span>
    </div>

    <div class="event-card" *ngFor="let event of pastEvents" style="opacity:0.65;">
      <img [src]="event.image" [alt]="event.title" class="event-image"
        (error)="$any($event.target).src='assets/Budva.jpg'"
        style="filter:grayscale(0.6);">
      <div class="event-info">
        <h3 class="event-name">{{ event.title }}</h3>
        <div class="event-time">
          <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          {{ event.time }} · {{ event.location }}
        </div>
        <span class="event-status" style="background:var(--gray-100);color:var(--gray-500);">COMPLETED</span>
      </div>
    </div>

    <div class="empty-events" *ngIf="upcomingEvents.length === 0 && pastEvents.length === 0">
      No events scheduled.
    </div>

  </div>

</div>
