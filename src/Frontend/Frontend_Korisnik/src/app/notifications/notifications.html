<div class="notif-container">
  <div class="header">
    <button class="back-btn" (click)="goBack()" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Notifications</h1>
    <button class="mark-read"
            (click)="markAllRead()"
            [disabled]="unreadCount === 0"
            *ngIf="authService.isLoggedIn">
      Mark all read
    </button>
  </div>

  <div class="filter-bar">
    <button *ngFor="let f of filters"
            class="filter-chip"
            [class.active]="activeFilter === f"
            (click)="activeFilter = f">
      {{f}}
    </button>
  </div>

  <div class="notif-meta" *ngIf="authService.isLoggedIn">
    <span>{{ unreadCount }} unread</span>
    <span [class.live]="connected">{{ connected ? 'Live' : 'Synced' }}</span>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="state-message">
    Loading...
  </div>

  <!-- Guest: no notifications -->
  <div *ngIf="!authService.isLoggedIn && !isLoading" class="state-message">
    <div class="state-icon">&#128276;</div>
    <p>Log in to see your notifications</p>
  </div>

  <!-- Empty state for logged-in users -->
  <div *ngIf="authService.isLoggedIn && !isLoading && filteredNotifications.length === 0"
       class="state-message">
    <div class="state-icon">&#128276;</div>
    <p>No notifications yet</p>
  </div>

  <div class="scroll-area">
    <div class="notif-card"
         *ngFor="let n of filteredNotifications"
         [class.unread]="!n.isRead"
         (click)="openNotification(n)">
      <div class="card-header">
        <div class="icon-box" [ngClass]="getTypeClass(n.type)">
          {{ getNotificationIcon(n.type) }}
        </div>
        <div class="title-meta">
          <div class="title-row">
            <h3>{{n.title}}</h3>
            <span class="new-badge" *ngIf="!n.isRead">NEW</span>
          </div>
          <span class="time">&#128338; {{ formatTime(n.createdAt) }}</span>
        </div>
      </div>

      <p class="notif-text" *ngIf="n.body">{{n.body}}</p>

      <div class="divider"></div>

      <div class="card-actions">
        <button class="view-btn">
          <span class="dot">&#9679;</span> View
        </button>
        <button (click)="deleteNotification(n, $event)"
                class="delete-btn"
                title="Delete">
          &times;
        </button>
      </div>
    </div>
  </div>
</div>
