<div class="auth-modal-overlay" (click)="closed.emit()">
  <div class="auth-modal" (click)="$event.stopPropagation()">
    <div class="auth-modal-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
    </div>
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="auth-modal-actions">
      <button class="btn-cancel" type="button" (click)="closed.emit()">{{ cancelLabel }}</button>
      <button class="btn-login" type="button" (click)="login.emit()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
          <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
        </svg>
        {{ loginLabel }}
      </button>
    </div>
  </div>
</div>
