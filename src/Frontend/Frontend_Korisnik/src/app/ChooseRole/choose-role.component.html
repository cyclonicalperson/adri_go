<div class="role-container">

  <div class="header-area">
    <h1>Welcome to the<br>digital guide</h1>
    <p>Choose the account type that best suits your needs to customize your experience.</p>
  </div>

  <div class="role-cards">

    <!-- TOURIST -->
    <button class="role-card" [class.selected]="selectedRole === 'tourist'" (click)="selectRole('tourist')">
      <div class="role-icon-box">
        <svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
      </div>
      <div class="role-text">
        <h3>A tourist</h3>
        <p>Explore the most beautiful beaches, mountains and cultural monuments. Plan trips and save favorites.</p>
      </div>
      <span class="check-mark">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </span>
    </button>

    <!-- ADMIN -->
    <button class="role-card" [class.selected]="selectedRole === 'admin'" (click)="selectRole('admin')">
      <div class="role-icon-box">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      </div>
      <div class="role-text">
        <h3>Administrator</h3>
        <p>Manage tourism by offering your city, add locations, events and communicate with visitors.</p>
      </div>
      <span class="check-mark">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </span>
    </button>

    <!-- Note -->
    <div class="admin-note">
      <span class="note-dot"></span>
      <p><strong>* Note:</strong> Administrator accounts require additional verification by Ministries of Tourism before they become active.</p>
    </div>

  </div>

  <button class="continue-btn" (click)="onContinue()">
    Continue
    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
  </button>

</div>
