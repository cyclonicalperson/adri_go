<div class="loader-container" *ngIf="loading">
  <p>Loading profile...</p>
</div>

<div class="account-container" *ngIf="!loading && (userData || isGuest)">

  <app-header title="Account" (backClick)="goBack()"></app-header>

  <div class="scroll-content">
    <div class="account-shell">
      <section class="profile-hero" *ngIf="userData">
        <div class="profile-hero-art" aria-hidden="true"></div>
        <div class="profile-hero-content">
          <button class="hero-edit-btn" type="button" (click)="isGuest ? showGuestPopup() : goToPersonalInfo()">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0L14.84 5.24l3.75 3.75 2.12-1.78z"/></svg>
            Edit Profile
          </button>

          <div class="profile-avatar-wrap" (click)="isGuest ? showGuestPopup() : goToPersonalInfo()" style="cursor:pointer">
            <img [src]="profileImageUrl" alt="Profile" class="profile-avatar">
            <span class="avatar-camera-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M20 5h-3.17l-1.84-2H9.01L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
            </span>
          </div>

          <div class="profile-main">
            <div class="profile-heading">
              <h2>
                {{ userData.fullName }}
                <span class="verified-badge" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M12 2l2.13 2.09 2.96-.43.94 2.84 2.84.94-.43 2.96L22 12l-2.09 2.13.43 2.96-2.84.94-.94 2.84-2.96-.43L12 22l-2.13-2.09-2.96.43-.94-2.84-2.84-.94.43-2.96L2 12l2.09-2.13-.43-2.96 2.84-.94.94-2.84 2.96.43L12 2zm-.97 14.2 5.3-5.3-1.06-1.06-4.24 4.24-2.12-2.12-1.06 1.06 3.18 3.18z"/></svg>
                </span>
              </h2>
            </div>

            <p class="profile-email">{{ userData.emailOrPhone }}</p>

            <div class="profile-tags" *ngIf="heroInterestBadges.length > 0">
              <span class="hero-tag" *ngFor="let interest of heroInterestBadges" [class.food-tag]="interest.kind === 'food'" [class.nature-tag]="interest.kind === 'nature'">
                <span class="hero-tag-icon" aria-hidden="true">{{ interest.icon }}</span>
                <span class="hero-tag-label">{{ interest.label }}</span>
              </span>
            </div>
          </div>
        </div>
      </section>

      <section class="profile-stats profile-stats-mobile" *ngIf="userData">
        <button class="profile-stat-card saved-stat" type="button" (click)="goToSaved()">
          <span class="profile-stat-top">
            <span class="profile-stat-icon green-tone">
              <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            </span>
            <span class="profile-stat-value">{{ userData.stats.saved || 0 }}</span>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-label">Saved Places</span>
            <span class="profile-stat-subtitle">Your favorite spots</span>
          </span>
        </button>

        <button class="profile-stat-card reviews-stat" type="button" (click)="goToMyReviews()">
          <span class="profile-stat-top">
            <span class="profile-stat-icon amber-tone">
              <svg viewBox="0 0 24 24"><path d="m12 17.27 6.18 3.73-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </span>
            <span class="profile-stat-value">{{ userData.stats.reviews || 0 }}</span>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-label">Reviews</span>
            <span class="profile-stat-subtitle">Places you reviewed</span>
          </span>
        </button>

        <button class="profile-stat-card trips-stat" type="button" (click)="goToCalendar()">
          <span class="profile-stat-top">
            <span class="profile-stat-icon violet-tone">
              <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
            </span>
            <span class="profile-stat-value">{{ userData.stats.upcoming || 0 }}</span>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-label">Trips Planned</span>
            <span class="profile-stat-subtitle">Upcoming adventures</span>
          </span>
        </button>
      </section>

      <section class="profile-stats profile-stats-desktop" *ngIf="userData">
        <button class="profile-stat-card desktop-stat-card saved-stat" type="button" (click)="goToSaved()">
          <span class="profile-stat-icon green-tone">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-value">{{ userData.stats.saved || 0 }}</span>
            <span class="profile-stat-label">Saved Places</span>
            <span class="profile-stat-subtitle">Your favorite spots</span>
          </span>
          <span class="account-link-arrow stat-arrow">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </span>
        </button>

        <button class="profile-stat-card desktop-stat-card reviews-stat" type="button" (click)="goToMyReviews()">
          <span class="profile-stat-icon amber-tone">
            <svg viewBox="0 0 24 24"><path d="m12 17.27 6.18 3.73-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-value">{{ userData.stats.reviews || 0 }}</span>
            <span class="profile-stat-label">Reviews</span>
            <span class="profile-stat-subtitle">Places you reviewed</span>
          </span>
          <span class="account-link-arrow stat-arrow">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </span>
        </button>

        <button class="profile-stat-card desktop-stat-card trips-stat" type="button" (click)="goToCalendar()">
          <span class="profile-stat-icon violet-tone">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-value">{{ userData.stats.upcoming || 0 }}</span>
            <span class="profile-stat-label">Trips Planned</span>
            <span class="profile-stat-subtitle">Upcoming adventures</span>
          </span>
          <span class="account-link-arrow stat-arrow">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </span>
        </button>
      </section>

      <section class="account-section">
        <div class="section-heading">
          <h3 class="section-title">Management</h3>
        </div>

        <div class="account-list management-list">
          <button class="account-link-card management-row" type="button" (click)="goToPersonalInfo()">
            <span class="account-link-icon green-tone">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Personal Information</span>
              <span class="account-link-subtitle">Update your profile details, bio, and interests.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>

          <button class="account-link-card management-row" type="button" (click)="goToSettings()">
            <span class="account-link-icon blue-tone">
              <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Settings</span>
              <span class="account-link-subtitle">Preferences, notifications, and account behavior.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>

          <div class="account-link-card management-row toggle-card" (click)="toggleDarkMode()" role="button" tabindex="0">
            <span class="account-link-icon dark-tone">
              <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Dark Mode</span>
              <span class="account-link-subtitle">Switch the app between light and dark appearance.</span>
            </span>
            <label class="dark-toggle" (click)="$event.stopPropagation()">
              <input type="checkbox" [checked]="isDarkMode" (change)="toggleDarkMode()">
              <span class="dark-slider"></span>
            </label>
          </div>
        </div>
      </section>

      <section class="account-section">
        <div class="section-heading">
          <h3 class="section-title">Support & Privacy</h3>
        </div>

        <div class="account-list support-list">
          <button class="account-link-card support-row" type="button" (click)="goToHelp()">
            <span class="account-link-icon violet-tone">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Help & Support</span>
              <span class="account-link-subtitle">Get guidance, FAQs, and contact details when needed.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>

          <button class="account-link-card support-row" type="button" (click)="goToPrivacy()">
            <span class="account-link-icon rose-tone">
              <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Privacy & Terms</span>
              <span class="account-link-subtitle">Review privacy policy, permissions, and service terms.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>
        </div>
      </section>

      <section class="account-section account-section-logout" *ngIf="!isGuest">
        <div class="section-heading">
          <h3 class="section-title">Account</h3>
        </div>

        <div class="account-list logout-list">
          <button class="account-link-card logout-row" type="button" (click)="logout()">
            <span class="account-link-icon logout-tone">
              <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Logout</span>
              <span class="account-link-subtitle">Sign out of your AdriGo account.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>
        </div>
      </section>

      <section class="account-section account-section-logout" *ngIf="isGuest">
        <div class="section-heading">
          <h3 class="section-title">Account</h3>
        </div>

        <div class="account-list logout-list">
          <button class="account-link-card logout-row" type="button" (click)="goToLogin()">
            <span class="account-link-icon logout-tone">
              <svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Log in / Register</span>
              <span class="account-link-subtitle">Access your AdriGo account or create a new one.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>
          <button class="account-link-card logout-row admin-register-row" type="button" (click)="goToAdminRegister()">
            <span class="account-link-icon green-tone">
              <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </span>
            <span class="account-link-copy">
              <span class="account-link-title">Register as admin</span>
              <span class="account-link-subtitle">Create an account to post destinations and manage tourism content.</span>
            </span>
            <span class="account-link-arrow">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </button>
        </div>
      </section>

      <!-- Guest: hero banner (styled like logged-in profile hero) -->
      <section class="guest-hero" *ngIf="isGuest">
        <div class="guest-hero-art" aria-hidden="true"></div>
        <div class="guest-hero-content">
          <div class="guest-avatar-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="guest-hero-info">
            <div class="profile-heading">
              <h2>Guest User</h2>
            </div>
            <p class="profile-email">Not signed in</p>
            <div class="profile-tags">
              <span class="hero-tag"><span class="hero-tag-icon">&#128205;</span><span class="hero-tag-label">Save places</span></span>
              <span class="hero-tag"><span class="hero-tag-icon">&#11088;</span><span class="hero-tag-label">Write reviews</span></span>
            </div>
          </div>
        </div>
      </section>

      <!-- Guest: locked stats (same layout as logged-in) -->
      <section class="profile-stats profile-stats-mobile" *ngIf="isGuest">
        <button class="profile-stat-card saved-stat guest-stat" type="button" (click)="showGuestPopup()">
          <span class="profile-stat-top">
            <span class="profile-stat-icon green-tone">
              <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            </span>
            <span class="profile-stat-value guest-lock-icon">&#128274;</span>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-label">Saved Places</span>
            <span class="profile-stat-subtitle">Your favorite spots</span>
          </span>
        </button>
        <button class="profile-stat-card reviews-stat guest-stat" type="button" (click)="showGuestPopup()">
          <span class="profile-stat-top">
            <span class="profile-stat-icon amber-tone">
              <svg viewBox="0 0 24 24"><path d="m12 17.27 6.18 3.73-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </span>
            <span class="profile-stat-value guest-lock-icon">&#128274;</span>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-label">Reviews</span>
            <span class="profile-stat-subtitle">Places you reviewed</span>
          </span>
        </button>
        <button class="profile-stat-card trips-stat guest-stat" type="button" (click)="showGuestPopup()">
          <span class="profile-stat-top">
            <span class="profile-stat-icon violet-tone">
              <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
            </span>
            <span class="profile-stat-value guest-lock-icon">&#128274;</span>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-label">Trips Planned</span>
            <span class="profile-stat-subtitle">Upcoming adventures</span>
          </span>
        </button>
      </section>

      <!-- Guest: locked stats desktop -->
      <section class="profile-stats profile-stats-desktop" *ngIf="isGuest">
        <button class="profile-stat-card desktop-stat-card saved-stat guest-stat" type="button" (click)="showGuestPopup()">
          <span class="profile-stat-icon green-tone">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-value guest-lock-icon">&#128274;</span>
            <span class="profile-stat-label">Saved Places</span>
            <span class="profile-stat-subtitle">Sign in to view</span>
          </span>
          <span class="account-link-arrow stat-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
        <button class="profile-stat-card desktop-stat-card reviews-stat guest-stat" type="button" (click)="showGuestPopup()">
          <span class="profile-stat-icon amber-tone">
            <svg viewBox="0 0 24 24"><path d="m12 17.27 6.18 3.73-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-value guest-lock-icon">&#128274;</span>
            <span class="profile-stat-label">Reviews</span>
            <span class="profile-stat-subtitle">Sign in to view</span>
          </span>
          <span class="account-link-arrow stat-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
        <button class="profile-stat-card desktop-stat-card trips-stat guest-stat" type="button" (click)="showGuestPopup()">
          <span class="profile-stat-icon violet-tone">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
          </span>
          <span class="profile-stat-copy">
            <span class="profile-stat-value guest-lock-icon">&#128274;</span>
            <span class="profile-stat-label">Trips Planned</span>
            <span class="profile-stat-subtitle">Sign in to view</span>
          </span>
          <span class="account-link-arrow stat-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
