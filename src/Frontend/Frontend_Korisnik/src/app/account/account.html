<div class="loader-container" *ngIf="loading">
  <p>Loading profile...</p>
</div>

<div class="account-container" *ngIf="!loading && userData">

  <div class="header-bar">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Account</h1>
  </div>

  <div class="scroll-content">

    <div class="user-card">
      <div class="profile-pic-wrapper">
        <img [src]="userData.profilePic || 'assets/default-profile.svg'" alt="Profile" class="profile-pic">
      </div>
      <div class="user-text">
        <h2>{{userData.fullName}}</h2>
        <p>{{userData.emailOrPhone}}</p>
      </div>
    </div>

    <div class="interests-section" *ngIf="userData.interests && userData.interests.length > 0">
      <h3 class="section-title" style="margin-top: 15px; margin-bottom: 10px;">My Interests</h3>
      <div class="interest-chips">
        <span *ngFor="let interest of userData.interests" class="chip">
          {{ interest }}
        </span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value">{{userData.stats.saved || 0}}</span>
        <span class="stat-label">Saved</span>
      </div>
      <div class="stat-card">
        <span class="stat-value">{{userData.stats.reviews || 0}}</span>
        <span class="stat-label">Reviews</span>
      </div>
      <div class="stat-card">
        <span class="stat-value">{{userData.stats.upcoming || 0}}</span>
        <span class="stat-label">Calendar</span>
      </div>
    </div>

    <section class="menu-section">
      <h3 class="section-title">Management</h3>
      <div class="menu-items-group">
        <button class="menu-link" (click)="goToPersonalInfo()">
          <span class="link-icon personal-bg">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </span>
          <span class="link-text">Personal Information</span>
          <span class="link-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
        <button class="menu-link" (click)="goToSettings()">
          <span class="link-icon settings-bg">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
          </span>
          <span class="link-text">Settings</span>
          <span class="link-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
      </div>
    </section>

    <section class="menu-section">
      <h3 class="section-title">Support & Privacy</h3>
      <div class="menu-items-group">
        <button class="menu-link" (click)="goToHelp()">
          <span class="link-icon help-bg">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
          </span>
          <span class="link-text">Help & Support</span>
          <span class="link-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
        <button class="menu-link" (click)="goToPrivacy()">
          <span class="link-icon privacy-bg">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
          </span>
          <span class="link-text">Privacy & Terms</span>
          <span class="link-arrow"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></span>
        </button>
      </div>
    </section>

  </div>

  <div class="footer">
    <button class="logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      Logout
    </button>
  </div>

</div>
