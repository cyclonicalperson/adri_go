<div class="main-layout">
  <div class="phone-container">
    
    <div class="content-wrapper">
      <header class="top-header">
        <h1>Find your next stay!</h1>
        <div class="cal-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </div>
      </header>

      <section class="search-section">
        <div class="input-wrap">
          <svg class="search-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="Lokacija">
        </div>
        
        <div class="input-wrap">
          <svg class="search-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <input type="text" placeholder="check-in date">
        </div>

        <div class="pills">
          <span>adults</span>
          <span>children</span>
          <span>rooms</span>
        </div>

        <button class="search-btn" (click)="goToResults()">Search</button>
      </section>

      <section class="categories">
        <div class="cat active">
          <div class="circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
          </div>
          <span class="val">300+</span>
        </div>
        
        <div class="cat">
          <div class="circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path></svg>
          </div>
          <span class="val">150+</span>
        </div>
        
        <div class="cat">
          <div class="circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line></svg>
          </div>
          <span class="val">50+</span>
        </div>
      </section>

      <div class="horizontal-section">
        <h2>Explore</h2>
        <swiper-container slides-per-view="1.3" space-between="20" slides-offset-before="8">
          @for (item of exploreItems; track item.id) {
            <swiper-slide>
              <div class="explore-card">
                <img [src]="item.image" [alt]="item.name">
                <div class="label">{{ item.name }}</div>
              </div>
            </swiper-slide>
          }
        </swiper-container>
      </div>

      <div class="horizontal-section">
        <h2>Last Minute</h2>
        <swiper-container slides-per-view="2.2" space-between="15" slides-offset-before="8">
          @for (item of lastMinuteItems; track item.id) {
            <swiper-slide>
              <div class="lastminute-card">
                <img [src]="item.image" alt="Apartman">
                <div class="info-bar">
                  <span>{{ item.name }}</span>
                  <span class="price">{{ item.price }}€</span>
                </div>
              </div>
            </swiper-slide>
          }
        </swiper-container>
      </div>
    </div> </div>
</div>
