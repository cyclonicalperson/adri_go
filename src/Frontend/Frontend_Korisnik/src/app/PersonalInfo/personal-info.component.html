<div class="loader-container" *ngIf="loading">
  <p>Loading...</p>
</div>

<div class="subpage-container" *ngIf="!loading">

  <div class="header-bar">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Personal Information</h1>
    <button class="edit-toggle-btn" (click)="toggleEdit()">
      <svg *ngIf="!editMode" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <svg *ngIf="editMode" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      {{ editMode ? 'Cancel' : 'Edit' }}
    </button>
  </div>

  <div class="scroll-content">

    <div class="success-toast" *ngIf="saveSuccess">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Changes saved successfully!
    </div>

    <div class="avatar-section">
      <div class="avatar-wrapper">
        <img *ngIf="userData?.profilePic" [src]="userData!.profilePic" class="avatar-img" alt="Profile">
        <div *ngIf="!userData?.profilePic" class="avatar-initials">{{ getInitials() }}</div>
      </div>
      <button class="change-photo-btn" *ngIf="editMode">
        <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M18.2 12c0-.36-.03-.72-.08-1.06l2.3-1.8c.21-.16.27-.46.13-.69l-2.19-3.78a.5.5 0 0 0-.67-.19l-2.71 1.09a7.5 7.5 0 0 0-1.82-1.05l-.41-2.88a.49.49 0 0 0-.5-.42h-4.38a.49.49 0 0 0-.5.42l-.41 2.88A7.5 7.5 0 0 0 5.54 6.57L2.83 5.48a.5.5 0 0 0-.67.19L-.03 9.45c-.14.23-.07.53.13.69l2.3 1.8A7.5 7.5 0 0 0 2.4 12c0 .36.03.72.08 1.06l-2.3 1.8c-.2.16-.27.46-.13.69l2.19 3.78c.14.23.44.3.67.19l2.71-1.09c.58.4 1.18.74 1.82 1.05l.41 2.88c.07.22.27.42.5.42h4.38c.23 0 .43-.2.5-.42l.41-2.88a7.5 7.5 0 0 0 1.82-1.05l2.71 1.09c.23.11.53.04.67-.19l2.19-3.78c.14-.23.07-.53-.13-.69l-2.3-1.8c.05-.34.08-.7.08-1.06z"/></svg>
        Change Photo
      </button>
    </div>

    <!-- VIEW MODE -->
    <div class="info-group" *ngIf="!editMode">
      <div class="info-section-title">Basic Info</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-row-icon green-bg">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="info-row-content">
            <span class="info-label">Full Name</span>
            <span class="info-value">{{ userData?.fullName || '—' }}</span>
          </div>
        </div>
        <div class="info-divider"></div>
        <div class="info-row">
          <div class="info-row-icon blue-bg">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <div class="info-row-content">
            <span class="info-label">Email / Phone</span>
            <span class="info-value">{{ userData?.emailOrPhone || '—' }}</span>
          </div>
        </div>
        <div class="info-divider"></div>
        <div class="info-row">
          <div class="info-row-icon orange-bg">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </div>
          <div class="info-row-content">
            <span class="info-label">Location</span>
            <span class="info-value">{{ form.location || '—' }}</span>
          </div>
        </div>
        <ng-container *ngIf="form.bio">
          <div class="info-divider"></div>
          <div class="info-row">
            <div class="info-row-icon gray-bg">
              <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </div>
            <div class="info-row-content">
              <span class="info-label">Bio</span>
              <span class="info-value">{{ form.bio }}</span>
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- EDIT MODE -->
    <div class="edit-group" *ngIf="editMode">
      <div class="info-section-title">Edit Info</div>

      <div class="field-group">
        <label class="field-label">Full Name</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input type="text" class="field-input" [(ngModel)]="form.fullName" placeholder="Your full name">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Email / Phone</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <input type="text" class="field-input" [(ngModel)]="form.emailOrPhone" placeholder="Email or phone number">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Location</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <input type="text" class="field-input" [(ngModel)]="form.location" placeholder="e.g. Budva, Montenegro">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Bio</label>
        <div class="field-input-wrap textarea-wrap">
          <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          <textarea class="field-input" [(ngModel)]="form.bio" placeholder="Tell others about yourself..." rows="3"></textarea>
        </div>
      </div>
    </div>

  </div>

  <div class="footer" *ngIf="editMode">
    <button class="save-btn" (click)="saveChanges()">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Save Changes
    </button>
  </div>

</div>
