<div class="activities-page">
  <header class="topbar">
    <button class="icon-btn" (click)="goToMap()" aria-label="Back to map">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Activities</h1>
    <button class="icon-btn" (click)="goToNotifications()" aria-label="Notifications">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </button>
  </header>

  <section class="controls">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg>
      <input [(ngModel)]="searchQuery" placeholder="Search activities">
    </div>
    <select [(ngModel)]="sortOption">
      <option value="name-asc">Name A-Z</option>
      <option value="popular">Most viewed</option>
      <option value="difficulty">Difficulty</option>
    </select>
  </section>

  <div class="state" *ngIf="isLoading">Loading activities...</div>
  <div class="state error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <main class="activity-grid" *ngIf="!isLoading && !errorMessage">
    <article class="activity-card" *ngFor="let activity of visibleActivities">
      <div class="activity-head">
        <span class="activity-dot" [style.background]="activity.color"></span>
        <div>
          <h2>{{ activity.name }}</h2>
          <p>{{ activity.locationName || activity.category }}</p>
        </div>
      </div>
      <p class="description">{{ activity.description || 'No description available.' }}</p>
      <div class="tags">
        <span *ngIf="activity.duration">{{ activity.duration }}</span>
        <span *ngIf="activity.difficulty">{{ activity.difficulty }}</span>
        <span *ngIf="activity.linkedPosts">{{ activity.linkedPosts }} places</span>
      </div>
      <button class="primary-btn" (click)="openActivity(activity)" [disabled]="!activity.postId && (activity.lat == null || activity.lng == null)">
        Open
      </button>
    </article>

    <div class="state" *ngIf="visibleActivities.length === 0">No activities found.</div>
  </main>
</div>
