<div class="activities-page">
  <app-header title="Activities"></app-header>

  <section class="controls">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg>
      <input [(ngModel)]="searchQuery" placeholder="Search activities">
    </div>
    <select [(ngModel)]="sortOption">
      <option value="name-asc">Name A-Z</option>
      <option value="popular">Most viewed</option>
      <option value="difficulty">Difficulty</option>
    </select>
  </section>

  <div class="state" *ngIf="isLoading">Loading activities...</div>
  <div class="state error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <main class="activity-grid" *ngIf="!isLoading && !errorMessage">
    <article class="activity-card" *ngFor="let activity of visibleActivities">
      <div class="activity-head">
        <span class="activity-icon" [style.--activity-color]="activity.color || '#22c55e'">
          <svg viewBox="0 0 24 24" [ngSwitch]="getActivityIcon(activity)" aria-hidden="true">
            <ng-container *ngSwitchCase="'bike'">
              <path d="M5.5 19a3.5 3.5 0 1 1 2.9-5.47l1.34-2.68-1.42-2.14H6V7h3.4l1.48 2.22L13.5 7H17v1.7h-2.86l-1.8 1.53 1.24 2.01h1.82A3.5 3.5 0 1 1 15.5 14h-2.86l-2-3.23-1.2 2.4A3.5 3.5 0 0 1 5.5 19Zm0-1.7a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6Zm13 0a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'water'">
              <path d="M12 3s6 6.08 6 11a6 6 0 0 1-12 0c0-4.92 6-11 6-11Zm0 15.5a4.5 4.5 0 0 0 4.48-4.08c-1.12.62-2.6.6-4.43-.08-1.77-.66-3.24-.65-4.4.02A4.5 4.5 0 0 0 12 18.5Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'food'">
              <path d="M7 2h2v8H7V2Zm4 0h2v8h-2V2ZM5 2h1.5v8H5V2Zm2 9h6v11h-2v-8H9v8H7V11Zm10-8h2v19h-2v-7h-2V7c0-2.21.9-4 2-4Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'culture'">
              <path d="M12 3 3 7v2h18V7l-9-4ZM5 11v7H3v2h18v-2h-2v-7h-2v7h-3v-7h-4v7H7v-7H5Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'wellness'">
              <path d="M12 21c-3.6-2.1-6-5.1-6-8.3 0-2.3 1.6-4.2 3.7-4.2 1.1 0 1.9.45 2.3 1.1.4-.65 1.2-1.1 2.3-1.1 2.1 0 3.7 1.9 3.7 4.2 0 3.2-2.4 6.2-6 8.3ZM12 7.8C10.5 6.1 9.6 4.5 9.6 3h4.8c0 1.5-.9 3.1-2.4 4.8Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'nightlife'">
              <path d="M7 2h10l-1 9.5A4 4 0 0 1 13 15.3V20h4v2H7v-2h4v-4.7a4 4 0 0 1-3-3.8L7 2Zm2.2 2 .35 3h4.9l.35-3H9.2Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'shopping'">
              <path d="M7 7V6a5 5 0 0 1 10 0v1h3v14H4V7h3Zm2 0h6V6a3 3 0 0 0-6 0v1Zm0 4H7v2h2v-2Zm8 0h-2v2h2v-2Z"/>
            </ng-container>
            <ng-container *ngSwitchCase="'hiking'">
              <path d="M13.5 5.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm-3.4 15.9 1-4.3 2 1.9v4h2v-5.2l-2.2-2.1.7-3.1c1.25 1.35 3.05 2.25 5.4 2.35v-2c-1.9-.08-3.35-.92-4.25-2.42l-.95-1.58a2.15 2.15 0 0 0-2.66-.93L6 10.2V15h2v-3.45l1.55-.66-1.55 7.62-3.9-.8-.4 1.96 6.4 1.73Z"/>
            </ng-container>
            <ng-container *ngSwitchDefault>
              <path d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z"/>
            </ng-container>
          </svg>
        </span>
        <div>
          <h2>{{ activity.name }}</h2>
          <p>{{ activity.locationName || activity.category }}</p>
        </div>
      </div>
      <p class="description">{{ activity.description || 'No description available.' }}</p>
      <div class="tags">
        <span *ngIf="activity.duration">{{ activity.duration }}</span>
        <span *ngIf="activity.difficulty">{{ activity.difficulty }}</span>
        <span *ngIf="activity.linkedPosts">{{ activity.linkedPosts }} places</span>
        <span class="activity-tag" *ngFor="let tag of getTagList(activity.tags)">{{ tag }}</span>
      </div>
      <button class="primary-btn" (click)="openActivity(activity)">
        Show places
      </button>
    </article>

    <div class="state" *ngIf="visibleActivities.length === 0">No activities found.</div>
  </main>

  <app-auth-required-modal
    *ngIf="showAuthPopup"
    message="Create a free account or log in to explore personalized activities."
    (closed)="closeAuthPopup()"
    (login)="goToLogin()">
  </app-auth-required-modal>

  <app-desktop-footer active="explore"></app-desktop-footer>
  <app-mobile-tourist-nav active="explore"></app-mobile-tourist-nav>
</div>
