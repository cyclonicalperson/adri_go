<div class="saved-container">
  <div class="header">
    <button class="back-btn" (click)="goBack()">‹</button>
    <h1>Saved</h1>
  </div>

  <div class="filter-scroll">
    <div class="chips-row">
      <button 
        *ngFor="let f of ['All', 'Nature', 'Culture', 'Food']"
        class="chip" 
        [class.active]="activeFilter === f"
        (click)="setFilter(f)">
        {{f}}
      </button>
    </div>
  </div>

  <div class="scroll-content">
    <p class="section-label">ALL COLLECTIONS ({{filteredItems.length}})</p>

    <div class="card" *ngFor="let item of filteredItems">
      <div class="image-box">
        <img [src]="item.imageUrl" [alt]="item.title">
        <span class="badge" [ngClass]="item.category.toLowerCase()">{{item.category}}</span>
        <button class="heart-btn">🤍</button>
      </div>
      <div class="card-body">
        <div class="title-row">
          <h3>{{item.title}}</h3>
          <span class="rating">⭐ {{item.rating}}</span>
        </div>
        <div class="meta-row">
          <span>📍 {{item.distance}} km away</span>
          <span [class.closed]="!item.isOpen">🕒 {{item.status}}</span>
          <span class="reviews">({{item.reviews}} reviews)</span>
        </div>
        <button class="view-link" (click)="viewDetails(item.id)">
          View details <span class="arrow">↗</span>
        </button>
      </div>
    </div>

    <div class="loader-box">
      <div class="spinner"></div>
      <p>Discovering more gems...</p>
    </div>
  </div>

  <div class="footer">
    <button class="map-btn" (click)="showOnMap()">
      🗺️ Show on map
    </button>
  </div>
</div>
