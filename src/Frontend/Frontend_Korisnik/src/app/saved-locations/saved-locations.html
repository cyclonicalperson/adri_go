<div class="saved-container">

  <div class="header">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <h1>Saved</h1>
  </div>

  <div class="filter-scroll" *ngIf="!isLoading || savedItems.length > 0">
    <div class="chips-row">
      <button *ngFor="let f of ['All', 'Nature', 'Culture', 'Food', 'Beach']"
        class="chip" [class.active]="activeFilter === f" (click)="setFilter(f)">
        {{f}}
      </button>
    </div>
  </div>

  <div class="scroll-content">
    
    <div class="loader-box" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Discovering your gems...</p>
    </div>

    <ng-container *ngIf="!isLoading">
      
      <p class="section-label" *ngIf="filteredItems.length > 0">
        {{ activeFilter | uppercase }} COLLECTIONS ({{ filteredItems.length }})
      </p>

      <div class="card" *ngFor="let item of filteredItems" (click)="viewDetails(item.id)">
        <div class="image-box">
          <img [src]="item.imageUrl || defaultImage" 
               (error)="item.imageUrl = defaultImage" 
               [alt]="item.title" 
               class="main-image">
          <div class="image-overlay"></div>

          <span class="badge" [ngClass]="item.category.toLowerCase()">
            <span class="dot"></span>
            {{item.category | uppercase}}
          </span>

          <button class="heart-btn" (click)="removeSaved(item.id, $event)">
            <svg viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </button>
        </div>

        <div class="card-body">
          <div class="title-row">
            <h3>{{item.title}}</h3>
            <span class="rating">
              <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              {{item.rating}}
            </span>
          </div>

          <div class="meta-row">
            <span class="info-pill">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              {{item.distance}} km away
            </span>
            <span class="info-pill" [class.open]="item.isOpen" [class.closed]="!item.isOpen">
              <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
              {{item.status}}
            </span>
            <span class="reviews">({{item.reviews}} reviews)</span>
          </div>

          <div class="divider"></div>

          <button class="view-link" (click)="viewDetails(item.id); $event.stopPropagation()">
            View details
            <span class="arrow-icon">
              <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </span>
          </button>
        </div>
      </div>

      <div class="empty-state" *ngIf="filteredItems.length === 0">
        <svg class="empty-icon" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
        <p>No saved items in <b>{{activeFilter}}</b> category.</p>
        <button class="explore-btn" (click)="showOnMap()" *ngIf="activeFilter === 'All'">Explore locations</button>
      </div>

    </ng-container>
  </div>

  <div class="footer" *ngIf="!isLoading">
    <button class="map-btn" (click)="showOnMap()">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      Show on map
    </button>
  </div>

</div>
