<div class="detours-panel" *ngIf="scenicSuggestions.length > 0">
  <div class="panel-heading">
    <div>
      <span class="panel-kicker">Detour ideas</span>
      <h3>Make the route intentionally more interesting</h3>
    </div>
  </div>

  <button type="button" class="detour-card" *ngFor="let suggestion of scenicSuggestions" (click)="detourSelected.emit(suggestion)">
    <div class="detour-copy">
      <div class="detour-title">{{ cleanTitle(suggestion.location.title) }}</div>
      <div class="detour-meta">
        <span>{{ formatPostType(suggestion.location.postType) }}</span>
        <span>{{ suggestion.distanceToRouteKm | number:'1.1-1' }} km off route</span>
        <span>~{{ suggestion.estimatedExtraMinutes }} min</span>
      </div>
      <p>{{ suggestion.reason }}</p>
    </div>
    <button type="button" class="detour-add-btn" (click)="$event.stopPropagation(); detourAdded.emit(suggestion)">
      Add detour
    </button>
  </button>
</div>
