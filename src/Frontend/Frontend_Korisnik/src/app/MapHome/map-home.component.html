<div class="map-wrapper">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-left">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
      </span>
      <span class="logo-text">AdriGo</span>
    </div>
    <div class="header-right">
      <button class="header-login-btn" (click)="goToLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        Login
      </button>
      <button class="header-menu-btn" (click)="toggleMenu()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>
  </div>

  <!-- SEARCH BAR -->
  <div class="top-ui-layer">
    <div class="search-container">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
      </span>
      <input type="text" class="search-input" placeholder="Search locations..."
        (keyup.enter)="onSearch($event)">
      <button class="filter-btn" (click)="openFilters()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- LOCATION POPUP CARD -->
  <app-location-details-card
    *ngIf="selectedLocation"
    [locationData]="selectedLocation"
    (onClose)="closeLocationDetails()"
    (click)="viewFullDetails()"
    style="cursor: pointer;">
  </app-location-details-card>

  <!-- FOOTER NAV -->
  <div class="app-footer" *ngIf="!selectedLocation">

    <button class="footer-btn" [class.active]="activeTab === 'map'" (click)="activeTab = 'map'">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
        </svg>
      </span>
      <span class="footer-label">Map</span>
    </button>

    <button class="footer-btn" [class.active]="activeTab === 'list'" (click)="toggleListView()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/>
        </svg>
      </span>
      <span class="footer-label">Explore</span>
    </button>

    <button class="footer-btn" [class.active]="activeTab === 'saved'" (click)="goToSaved()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
        </svg>
      </span>
      <span class="footer-label">Saved</span>
    </button>

    <button class="footer-btn" [class.active]="activeTab === 'tickets'" (click)="goToTickets()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 12c0-1.1.9-2 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-1.99.9-1.99 2v4c1.1 0 1.99.9 1.99 2s-.89 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2zm-4.42 4.8L12 14.5l-3.58 2.3 1.08-4.12-3.29-2.69 4.24-.25L12 5.8l1.54 3.95 4.24.25-3.29 2.69 1.09 4.11z"/>
        </svg>
      </span>
      <span class="footer-label">Tickets</span>
    </button>

    <button class="footer-btn" [class.active]="activeTab === 'account'" (click)="goToAccount()">
      <span class="footer-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </span>
      <span class="footer-label">Account</span>
    </button>

  </div>

  <!-- SIDE MENU -->
  <app-side-menu *ngIf="isMenuOpen" (onClose)="isMenuOpen = false"></app-side-menu>

</div>
