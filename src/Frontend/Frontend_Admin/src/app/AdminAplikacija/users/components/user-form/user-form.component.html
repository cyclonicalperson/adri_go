<div class="page">

  <div class="header">
    <h2 class="title">{{ isEdit ? 'Izmeni korisnika' : 'Novi korisnik' }}</h2>
    <button class="btn-back" (click)="cancel()">← Nazad</button>
  </div>

  @if (error) {
  <div class="alert-error">{{ error }}</div>
  }

  <form class="layout" [formGroup]="form" (ngSubmit)="submit()">

    <div class="left-col">

      <div class="card">
        <h3 class="card-title">Lični podaci</h3>

        <div class="field">
          <label class="label">Ime i prezime *</label>
          <input class="input" [class.invalid]="f('fullName').invalid && f('fullName').touched"
                 formControlName="fullName" placeholder="npr. Marko Jovanović" />
        </div>

        <div class="field">
          <label class="label">Email adresa *</label>
          <input class="input" type="email"
                 [class.invalid]="f('email').invalid && f('email').touched"
                 formControlName="email" placeholder="marko@example.com" />
        </div>

        <div class="field">
          <label class="label">
            {{ isEdit ? 'Nova lozinka (ostavite prazno da zadržite staru)' : 'Lozinka *' }}
          </label>
          <div class="input-wrap">
            <input class="input"
                   [type]="showPassword ? 'text' : 'password'"
                   [class.invalid]="f('password').invalid && f('password').touched"
                   formControlName="password"
                   placeholder="••••••••" />
            <button type="button" class="toggle-pw"
                    (click)="showPassword = !showPassword">
              {{ showPassword ? 'Sakrij' : 'Prikaži' }}
            </button>
          </div>
        </div>

        <div class="row-2">
          <div class="field toggle-field">
            <label class="label">Status</label>
            <label class="toggle">
              <input type="checkbox" formControlName="isActive" />
              <span class="toggle-track"></span>
              <span class="toggle-label">
                {{ f('isActive').value ? 'Aktivan' : 'Neaktivan' }}
              </span>
            </label>
          </div>

          @if (selectedRole === 'ORG') {
          <div class="field">
            <label class="label">Organizacija</label>
            <select class="input" formControlName="organizationId">
              <option [ngValue]="null">— Izaberite —</option>
              @for (org of organizations; track org.organizationId) {
              <option [value]="org.organizationId">{{ org.name }}</option>
              }
            </select>
          </div>
          }
        </div>
      </div>

    </div>

    <div class="right-col">

      <div class="card">
        <h3 class="card-title">Rola i permisije *</h3>
        <app-roles-permissions [roles]="roles"
                               [selectedRoleId]="f('roleId').value"
                               (roleSelected)="onRoleSelected($event)" />
        @if (f('roleId').invalid && f('roleId').touched) {
        <span class="field-error">Odaberite rolu.</span>
        }
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Otkaži</button>
        <button type="submit" class="btn-save" [disabled]="saving">
          {{ saving ? 'Čuvanje...' : (isEdit ? 'Sačuvaj izmene' : 'Kreiraj korisnika') }}
        </button>
      </div>

    </div>

  </form>

</div>
