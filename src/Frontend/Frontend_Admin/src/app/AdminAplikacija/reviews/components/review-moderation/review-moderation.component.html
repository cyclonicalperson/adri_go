<div class="overlay" (click)="closed.emit()">
  <div class="panel" (click)="$event.stopPropagation()">

    <div class="panel-header">
      <h3 class="panel-title">Moderacija recenzije</h3>
      <button class="btn-close" (click)="closed.emit()">✕</button>
    </div>

    <div class="panel-body">
      <app-review-card [review]="review" [showStatus]="true" />

      @if (review.entityName) {
      <div class="entity-info">
        <span class="entity-label">Za:</span>
        <span class="entity-name">{{ review.entityName }}</span>
        <app-badge variant="default">{{ entityTypeLabel(review.entityType) }}</app-badge>
      </div>
      }
    </div>

    <div class="panel-actions">
      <button class="btn-pending"
              [disabled]="review.status === 'PENDING'"
              (click)="pending()">
        Na čekanje
      </button>

      <button class="btn-reject"
              [disabled]="review.status === 'REJECTED'"
              (click)="reject()">
        Odbij
      </button>

      <button class="btn-approve"
              [disabled]="review.status === 'APPROVED'"
              (click)="approve()">
        Odobri
      </button>
    </div>

  </div>
</div>
