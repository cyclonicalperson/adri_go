<header class="topbar">
  <div class="left">
    <button class="btn-toggle"
            (click)="toggleSidebar.emit()"
            aria-label="Otvori/zatvori meni">
      ☰
    </button>
    <div class="header-left">
      <div class="header-title">{{ pageTitle$ | async }}</div>
      <div class="header-sub">{{ pageSubtitle }}</div>
    </div>
  </div>

  <div class="right">
    <div class="notif-btn" role="button" aria-label="Obaveštenja">
      🔔
      <span class="notif-dot" aria-hidden="true"></span>
    </div>
    <div class="user-meta">
      <div class="user-name">{{ auth.currentUser?.fullName }}</div>
      <div class="user-role">{{ roleLabel }}</div>
    </div>
    <div class="header-avatar" aria-hidden="true">{{ initials }}</div>
  </div>
</header>
