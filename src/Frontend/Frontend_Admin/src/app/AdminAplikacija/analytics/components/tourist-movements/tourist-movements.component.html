@if (movements.length === 0) {
<div class="empty">Nema podataka o kretanju.</div>
} @else {
<div class="layout">
  <app-map [markers]="markers"
           [centerLat]="43.85"
           [centerLng]="18.41"
           [zoom]="6"
           height="320px" />
  <div class="ranking">
    <div class="ranking-title">Top 5 destinacija</div>
    @for (m of topMovements; track m.regionId; let i = $index) {
    <div class="ranking-item">
      <span class="rank">{{ i + 1 }}</span>
      <span class="dest-name">{{ m.regionName }}</span>
      <span class="visit-count">{{ m.visitCount }}</span>
    </div>
    }
    <div class="legend">
      <div class="legend-item"><span class="dot" style="background:#22c55e"></span>Visok broj poseta</div>
      <div class="legend-item"><span class="dot" style="background:#f59e0b"></span>Srednji broj poseta</div>
      <div class="legend-item"><span class="dot" style="background:#3b82f6"></span>Nizak broj poseta</div>
    </div>
  </div>
</div>
}
