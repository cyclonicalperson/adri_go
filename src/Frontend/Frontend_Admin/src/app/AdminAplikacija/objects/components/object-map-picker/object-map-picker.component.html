<div class="picker">
  <p class="hint">Kliknite na mapu da postavite lokaciju objekta.</p>
  <app-map [centerLat]="lat"
           [centerLng]="lng"
           [zoom]="13"
           [clickable]="true"
           height="260px"
           (mapClicked)="onMapClick($event)" />
  @if (lat && lng) {
  <div class="coords">
    {{ lat.toFixed(5) }}°N, {{ lng.toFixed(5) }}°E
  </div>
  }
</div>
