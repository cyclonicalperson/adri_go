@if (reviews.length === 0) {
<div class="empty">Nema recenzija na čekanju.</div>
} @else {
<div class="list">
  @for (review of reviews; track review.reviewId) {
  <app-review-card [review]="review"
                   [showStatus]="true" />
  }
</div>
<a class="link-all" routerLink="/admin/reviews">
  Prikaži sve recenzije →
</a>
}
