<div class="page">

  <div class="header">
    <h2 class="title">{{ isEdit ? 'Izmeni rutu' : 'Nova ruta' }}</h2>
    <button class="btn-back" (click)="cancel()">← Nazad</button>
  </div>

  @if (error) {
  <div class="alert-error">{{ error }}</div>
  }

  <form class="layout" [formGroup]="form" (ngSubmit)="submit()">

    <div class="left-col">

      <div class="card">
        <h3 class="card-title">Osnovni podaci</h3>

        <div class="field">
          <label class="label">Naziv *</label>
          <input class="input" [class.invalid]="f('name').invalid && f('name').touched"
                 formControlName="name" placeholder="npr. Staza do Crnog jezera" />
        </div>

        <div class="row-2">
          <div class="field">
            <label class="label">Destinacija *</label>
            <select class="input"
                    [class.invalid]="f('destinationId').invalid && f('destinationId').touched"
                    formControlName="destinationId">
              <option [ngValue]="null">— Izaberite —</option>
              @for (d of destinations; track d.destinationId) {
              <option [value]="d.destinationId">{{ d.name }}</option>
              }
            </select>
          </div>
          <div class="field">
            <label class="label">Tip rute *</label>
            <select class="input" formControlName="routeType">
              @for (opt of typeOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
              }
            </select>
          </div>
        </div>

        <div class="row-3">
          <div class="field">
            <label class="label">Težina *</label>
            <select class="input" formControlName="difficulty">
              @for (opt of difficultyOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="field">
            <label class="label">Distanca (km) *</label>
            <input class="input" type="number" step="0.1" min="0.1"
                   [class.invalid]="f('distanceKm').invalid && f('distanceKm').touched"
                   formControlName="distanceKm" placeholder="npr. 12.5" />
          </div>
          <div class="field">
            <label class="label">Trajanje (min) *</label>
            <input class="input" type="number" min="1"
                   [class.invalid]="f('durationMin').invalid && f('durationMin').touched"
                   formControlName="durationMin" placeholder="npr. 180" />
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label class="label">Uspon (m)</label>
            <input class="input" type="number" min="0"
                   formControlName="elevationGainM" placeholder="npr. 450" />
          </div>
          <div class="field toggle-field">
            <label class="label">Status</label>
            <label class="toggle">
              <input type="checkbox" formControlName="isActive" />
              <span class="toggle-track"></span>
              <span class="toggle-label">
                {{ f('isActive').value ? 'Aktivna' : 'Neaktivna' }}
              </span>
            </label>
          </div>
        </div>

        <div class="field">
          <label class="label">Opis *</label>
          <textarea class="input textarea"
                    [class.invalid]="f('description').invalid && f('description').touched"
                    formControlName="description"
                    placeholder="Opis rute, preporuke, napomene..."
                    rows="4"></textarea>
        </div>
      </div>

    </div>

    <div class="right-col">

      <div class="card">
        <h3 class="card-title">Tačke rute</h3>
        <app-waypoint-editor [waypoints]="waypoints"
                             [centerLat]="centerLat"
                             [centerLng]="centerLng"
                             (waypointsChange)="waypoints = $event" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Otkaži</button>
        <button type="submit" class="btn-save" [disabled]="saving">
          {{ saving ? 'Čuvanje...' : (isEdit ? 'Sačuvaj izmene' : 'Kreiraj rutu') }}
        </button>
      </div>

    </div>

  </form>

</div>
