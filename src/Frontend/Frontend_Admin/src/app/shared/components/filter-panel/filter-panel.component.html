<div class="panel">

  @for (filter of filters; track filter.key) {
  <div class="filter-group">
    <label class="label">{{ filter.label }}</label>

    @if (filter.type === 'select') {
    <select class="control" [(ngModel)]="local[filter.key]">
      <option [ngValue]="null">— Sve —</option>
      @for (opt of filter.options; track opt.value) {
      <option [value]="opt.value">{{ opt.label }}</option>
      }
    </select>
    }

    @if (filter.type === 'date') {
    <input class="control"
           type="date"
           [(ngModel)]="local[filter.key]" />
    }

    @if (filter.type === 'range') {
    <div class="range-wrap">
      <input class="control range"
             type="number"
             [min]="filter.min"
             [max]="filter.max"
             [(ngModel)]="local[filter.key]" />
      @if (filter.min !== undefined && filter.max !== undefined) {
      <span class="range-hint">{{ filter.min }} – {{ filter.max }}</span>
      }
    </div>
    }

  </div>
  }

  <div class="actions">
    <button class="btn-apply" (click)="apply()">Primeni</button>
    @if (hasActive()) {
    <button class="btn-clear" (click)="clear()">Resetuj</button>
    }
  </div>

</div>
