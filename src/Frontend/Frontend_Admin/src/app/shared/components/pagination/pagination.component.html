@if (totalPages > 1) {
<div class="pagination">
  <button class="btn" [disabled]="page === 1" (click)="go(page - 1)">&#8592;</button>

  @for (p of pages; track p) {
  @if (p === -1) {
  <span class="dots">…</span>
  } @else {
  <button class="btn" [class.active]="p === page" (click)="go(p)">{{ p }}</button>
  }
  }

  <button class="btn" [disabled]="page === totalPages" (click)="go(page + 1)">&#8594;</button>
  <span class="info">{{ page }} / {{ totalPages }}</span>
</div>
}
